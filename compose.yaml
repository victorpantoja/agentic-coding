services:
  postgres:
    container_name: sovereign-brain-postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sovereign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereign}
      POSTGRES_DB: ${POSTGRES_DB:-sovereign_brain}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sovereign} -d ${POSTGRES_DB:-sovereign_brain}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    container_name: sovereign-brain-migrate
    image: migrate/migrate:latest
    volumes:
      - ./migrations:/migrations:ro
    command: >
      -path=/migrations
      -database=postgresql://${POSTGRES_USER:-sovereign}:${POSTGRES_PASSWORD:-sovereign}@postgres:5432/${POSTGRES_DB:-sovereign_brain}?sslmode=disable
      up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  mcp-server:
    container_name: sovereign-brain-mcp
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sovereign}:${POSTGRES_PASSWORD:-sovereign}@postgres:5432/${POSTGRES_DB:-sovereign_brain}
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
